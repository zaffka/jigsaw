services:
  traefik:
    image: docker.io/traefik:latest
    container_name: traefik
    networks:
      default:
        aliases:
          - s3.domain.tld
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - ".traefik/traefik.yml:/etc/traefik/traefik.yml"
      - ".traefik/dynamic:/etc/traefik/dynamic"

  postgres:
    container_name: postgres
    image: docker.io/postgres:18-alpine
    environment:
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=dev
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ".postgres/init.sql:/docker-entrypoint-initdb.d/init.sql"
      - "postgres_data:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # SeaweedFS - S3-compatible object storage
  # Web UI: http://localhost:8888/
  # S3 API: http://localhost:8333
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs
    ports:
      - "9333:9333"   # Master server
      - "8081:8080"   # Volume server
      - "8888:8888"   # Filer server + Web UI
      - "8333:8333"   # S3 API endpoint
    command: 'server -s3 -s3.config=/etc/seaweedfs/s3.json -dir=/data'
    volumes:
      - ./seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seaweedfs.rule=Host(`s3.domain.tld`)"
      - "traefik.http.routers.seaweedfs.entrypoints=web"
      - "traefik.http.services.seaweedfs.loadbalancer.server.port=8333"

volumes:
  postgres_data:
    driver: local
