<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Slicer WASM Demo</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.4rem; }
  .controls { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; margin: 1rem 0; }
  select, button, input { font-size: 1rem; padding: 0.4rem 0.8rem; }
  #status { color: #666; margin: 0.5rem 0; }
  #result { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 1rem; }
  #result img { border: 1px solid #eee; background: repeating-conic-gradient(#f0f0f0 0% 25%, white 0% 50%) 50%/16px 16px; }
  #silhouette-container { margin-top: 1rem; position: relative; display: inline-block; }
  #silhouette-container svg { display: block; border: 1px solid #ddd; }
  #pieces-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  #pieces-overlay img { position: absolute; cursor: grab; z-index: 10; }
  #pieces-overlay img.dragging { cursor: grabbing; z-index: 1000; }
  #pieces-overlay img.placed { cursor: default; opacity: 0.9; z-index: 1; }
</style>
</head>
<body>

<h1>Slicer WASM Demo</h1>

<div class="controls">
  <input type="file" id="file" accept="image/jpeg,image/png">
  <select id="mode">
    <option value="grid">Grid</option>
    <option value="merge">Merge</option>
    <option value="triangles">Triangles</option>
    <option value="diamonds">Diamonds</option>
    <option value="trapezoids">Trapezoids</option>
    <option value="parallelograms">Parallelograms</option>
    <option value="mixed">Mixed</option>
    <option value="puzzle" selected>Puzzle</option>
  </select>
  <label>Cols: <input type="number" id="cols" value="3" min="2" max="10" style="width:3rem"></label>
  <label>Rows: <input type="number" id="rows" value="3" min="2" max="10" style="width:3rem"></label>
  <button id="run" disabled>Slice</button>
</div>

<div id="status">Loading WASM...</div>
<div id="silhouette-container"></div>
<div id="result"></div>

<script src="wasm_exec.js"></script>
<script>
const go = new Go();
WebAssembly.instantiateStreaming(fetch("slicer.wasm"), go.importObject).then(result => {
  go.run(result.instance);
  document.getElementById("status").textContent = "WASM loaded. Select an image.";
  document.getElementById("run").disabled = false;
});

let imageBytes = null;

document.getElementById("file").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  imageBytes = new Uint8Array(await file.arrayBuffer());
  document.getElementById("status").textContent = `Image loaded: ${file.name} (${(file.size / 1024).toFixed(0)} KB)`;
});

document.getElementById("run").addEventListener("click", async () => {
  if (!imageBytes) {
    document.getElementById("status").textContent = "Select an image first.";
    return;
  }

  const mode = document.getElementById("mode").value;
  const cols = parseInt(document.getElementById("cols").value);
  const rows = parseInt(document.getElementById("rows").value);

  document.getElementById("status").textContent = "Slicing...";
  const t0 = performance.now();

  let res;
  switch (mode) {
    case "grid":
      res = slicer.grid(imageBytes, cols, rows);
      break;
    case "merge":
      res = slicer.merge(imageBytes, cols, rows, 42);
      break;
    case "puzzle":
      res = slicer.puzzle(imageBytes, cols, rows);
      break;
    default:
      // geometry shapes
      res = slicer.geometry(imageBytes, cols, rows, mode);
      break;
  }

  const elapsed = (performance.now() - t0).toFixed(0);

  if (res.error) {
    document.getElementById("status").textContent = `Error: ${res.error}`;
    return;
  }

  const pieces = JSON.parse(res.data);
  document.getElementById("status").textContent =
    `Done: ${pieces.length} pieces in ${elapsed}ms`;

  // Decode source image to get its natural dimensions.
  const blob = new Blob([imageBytes]);
  const srcImg = new Image();
  srcImg.src = URL.createObjectURL(blob);
  await new Promise(r => { srcImg.onload = r; });
  const srcW = srcImg.naturalWidth;
  const srcH = srcImg.naturalHeight;
  URL.revokeObjectURL(srcImg.src);

  // Build silhouette SVG from the actual sliced pieces (not hardcoded puzzle).
  const silContainer = document.getElementById("silhouette-container");
  const svgPaths = pieces.map(p =>
    `  <path data-id="${p.id}" d="${p.svg_path}" fill="none" stroke="#cccccc" stroke-width="2"/>`
  ).join("\n");
  const silSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${srcW} ${srcH}">\n${svgPaths}\n</svg>`;

  silContainer.innerHTML = silSVG;
  const svg = silContainer.querySelector("svg");

  // Fit SVG into the container (max 880px wide, preserve aspect ratio).
  const maxW = Math.min(880, window.innerWidth - 40);
  const aspectRatio = srcH / srcW;
  const displayW = maxW;
  const displayH = maxW * aspectRatio;
  svg.setAttribute("width", displayW);
  svg.setAttribute("height", displayH);

  const scaleX = displayW / srcW;
  const scaleY = displayH / srcH;

  // Create overlay for draggable pieces.
  const overlay = document.createElement("div");
  overlay.id = "pieces-overlay";
  silContainer.appendChild(overlay);

  // Clear the old thumbnail result area.
  document.getElementById("result").innerHTML = "";

  // Place pieces at random positions in the tray area below the silhouette,
  // then allow dragging them onto the grid.
  const trayY = displayH + 20;
  let trayX = 10;

  for (const p of pieces) {
    const img = document.createElement("img");
    img.src = "data:image/png;base64," + p.image_b64;
    img.title = `#${p.id} (${p.col},${p.row}) ${p.bounds.w}x${p.bounds.h}`;

    // Scale piece image to match the silhouette display size.
    const pieceDisplayW = p.bounds.w * scaleX;
    const pieceDisplayH = p.bounds.h * scaleY;
    img.style.width = pieceDisplayW + "px";
    img.style.height = pieceDisplayH + "px";

    // Store target position (where this piece should snap to).
    img.dataset.targetX = p.target_x * scaleX;
    img.dataset.targetY = p.target_y * scaleY;
    img.dataset.pieceId = p.id;

    // Initial position: tray below silhouette.
    img.style.left = trayX + "px";
    img.style.top = trayY + "px";
    trayX += pieceDisplayW + 8;
    if (trayX + pieceDisplayW > displayW) {
      trayX = 10;
    }

    overlay.appendChild(img);
    makeDraggable(img, scaleX, scaleY);
  }

  // Resize the container to fit the tray too.
  silContainer.style.width = displayW + "px";
  silContainer.style.minHeight = (trayY + 200) + "px";
});

const SNAP_THRESHOLD = 30;

function makeDraggable(img, scaleX, scaleY) {
  let startX, startY, origLeft, origTop;

  img.addEventListener("pointerdown", (e) => {
    if (img.classList.contains("placed")) return;
    e.preventDefault();
    img.setPointerCapture(e.pointerId);
    img.classList.add("dragging");

    startX = e.clientX;
    startY = e.clientY;
    origLeft = parseFloat(img.style.left);
    origTop = parseFloat(img.style.top);
  });

  img.addEventListener("pointermove", (e) => {
    if (!img.hasPointerCapture(e.pointerId)) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    img.style.left = (origLeft + dx) + "px";
    img.style.top = (origTop + dy) + "px";
  });

  img.addEventListener("pointerup", (e) => {
    if (!img.hasPointerCapture(e.pointerId)) return;
    img.releasePointerCapture(e.pointerId);
    img.classList.remove("dragging");

    const curX = parseFloat(img.style.left);
    const curY = parseFloat(img.style.top);
    const targetX = parseFloat(img.dataset.targetX);
    const targetY = parseFloat(img.dataset.targetY);

    const dist = Math.sqrt((curX - targetX) ** 2 + (curY - targetY) ** 2);
    if (dist < SNAP_THRESHOLD) {
      img.style.left = targetX + "px";
      img.style.top = targetY + "px";
      img.classList.add("placed");
    }
  });
}
</script>
</body>
</html>
